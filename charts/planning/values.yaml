# Default values for Planning Service
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: ghcr.io/mcp-log/planning
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podLabels:
  app.kubernetes.io/component: planning
  app.kubernetes.io/part-of: oms-ecosystem

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

ingress:
  enabled: false
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
  hosts:
    - host: planning.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: planning-tls
      hosts:
        - planning.example.com

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes:
  - name: tmp
    emptyDir: {}
  - name: cache
    emptyDir: {}

volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: cache
    mountPath: /app/cache

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - planning
          topologyKey: kubernetes.io/hostname

# Application-specific configuration
config:
  # Listen address (port)
  listenAddr: ":8080"

  # Log level: debug, info, warn, error
  logLevel: "info"

  # Graceful shutdown timeout
  shutdownTimeout: "30s"

# Database configuration
database:
  # Connection settings
  host: "postgresql.default.svc.cluster.local"
  port: 5432
  name: "oms_planning"
  user: "planning"
  sslMode: "require"

  # Connection pool settings
  maxConnections: 25
  minConnections: 5
  maxConnLifetime: "1h"
  maxConnIdleTime: "30m"
  healthCheckPeriod: "1m"

  # Use existing secret for database password
  # Secret must contain key: password
  existingSecret: ""
  # If existingSecret is empty, use this password (not recommended for production)
  password: ""

# Kafka configuration
kafka:
  # Comma-separated list of broker addresses
  brokers: "kafka.default.svc.cluster.local:9092"

  # Topic prefix for all events
  topicPrefix: "oms.plans"

  # Producer settings
  producer:
    acks: "all"  # Wait for all in-sync replicas
    compression: "snappy"
    maxAttempts: 3
    batchSize: 16384
    batchTimeout: "10ms"

  # Consumer group for inbound events (if any)
  consumerGroup: "planning-service"

  # Use existing secret for Kafka credentials (optional)
  # Secret must contain keys: username, password
  existingSecret: ""
  # SASL mechanism (optional): PLAIN, SCRAM-SHA-256, SCRAM-SHA-512
  saslMechanism: ""

# Monitoring and observability
metrics:
  enabled: true
  path: /metrics
  port: 8080

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

# Network Policy
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            name: ingress-nginx
      ports:
      - protocol: TCP
        port: 8080
  egress:
    - to:
      - namespaceSelector: {}
      ports:
      - protocol: TCP
        port: 5432  # PostgreSQL
      - protocol: TCP
        port: 9092  # Kafka
    - to:  # Allow DNS
      - namespaceSelector:
          matchLabels:
            name: kube-system
      ports:
      - protocol: UDP
        port: 53
